<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="fold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#D4C9BB"/>
      <stop offset="100%" stop-color="#BFB2A2"/>
    </linearGradient>
  </defs>
  <!-- Page background -->
  <rect x="64" y="64" width="384" height="384" rx="8" fill="#FAF7F3"/>
  <rect x="64" y="64" width="384" height="384" rx="8" fill="none" stroke="#D4C9BB" stroke-width="6"/>
  <!-- Folded corner (top-right) -->
  <path d="M388 64 L448 64 L448 124 Z" fill="#FAF7F3" stroke="#D4C9BB" stroke-width="6" stroke-linejoin="round"/>
  <path d="M388 64 L388 124 L448 124 Z" fill="url(#fold)" stroke="#D4C9BB" stroke-width="4" stroke-linejoin="round"/>
  <!-- Letter E as text lines on a page -->
  <!-- Top horizontal -->
  <rect x="148" y="168" width="200" height="22" rx="4" fill="#2A231D"/>
  <!-- Middle horizontal -->
  <rect x="148" y="248" width="160" height="22" rx="4" fill="#2A231D"/>
  <!-- Bottom horizontal -->
  <rect x="148" y="328" width="200" height="22" rx="4" fill="#2A231D"/>
  <!-- Vertical stroke of E -->
  <rect x="148" y="168" width="22" height="182" rx="4" fill="#2A231D"/>
</svg>
