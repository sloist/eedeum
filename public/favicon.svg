<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="fold" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#D4C9BB"/>
      <stop offset="100%" stop-color="#C4B5A3"/>
    </linearGradient>
  </defs>

  <!-- Page outline with folded corner -->
  <path d="
    M 56 24
    L 360 24
    L 456 120
    L 456 488
    L 56 488
    Z
  " fill="none" stroke="#2A231D" stroke-width="28" stroke-linejoin="round"/>

  <!-- Fold crease -->
  <path d="M 360 24 L 360 120 L 456 120" fill="none" stroke="#2A231D" stroke-width="20" stroke-linejoin="round"/>
  <!-- Fold face -->
  <path d="M 360 24 L 360 120 L 456 120 Z" fill="url(#fold)"/>

  <!-- Three text lines forming E -->
  <!-- Top line (full width) -->
  <line x1="130" y1="200" x2="380" y2="200" stroke="#2A231D" stroke-width="32" stroke-linecap="round"/>
  <!-- Middle line (shorter) -->
  <line x1="130" y1="290" x2="330" y2="290" stroke="#2A231D" stroke-width="32" stroke-linecap="round"/>
  <!-- Bottom line (full width) -->
  <line x1="130" y1="380" x2="380" y2="380" stroke="#2A231D" stroke-width="32" stroke-linecap="round"/>

  <!-- Left vertical connecting the lines (E spine) -->
  <line x1="130" y1="200" x2="130" y2="380" stroke="#2A231D" stroke-width="32" stroke-linecap="round"/>
</svg>
