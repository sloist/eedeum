<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />

    <!-- PWA meta tags -->
    <meta name="theme-color" content="#FFFFFF" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="이듬" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <meta name="description" content="당신이 멈춘 문장. 책 속 문장을 기록하고, 감상을 남기고, 다른 사람의 기록을 엿보는 독서 기록 서비스." />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="이듬 — 당신이 멈춘 문장" />
    <meta property="og:description" content="책 속 문장을 기록하고, 감상을 남기고, 다른 사람의 기록을 엿보는 독서 기록 서비스." />
    <meta property="og:site_name" content="이듬" />
    <meta property="og:locale" content="ko_KR" />
    <meta property="og:url" content="https://eedeum.com" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="이듬 — 당신이 멈춘 문장" />
    <meta name="twitter:description" content="책 속 문장을 기록하고, 감상을 남기고, 다른 사람의 기록을 엿보는 독서 기록 서비스." />

    <title>이듬</title>
  </head>
  <body>
    <div id="root"></div>
    <!-- Splash screen — disappears when React mounts -->
    <div id="splash" style="position:fixed;inset:0;z-index:9999;background:#FFFFFF;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity .3s ease">
      <div style="font-family:'Noto Serif KR',Georgia,serif;font-size:24px;font-weight:600;color:#1F1A15;letter-spacing:-.5px;margin-bottom:8px">이듬</div>
      <div style="font-family:'Noto Serif KR',Georgia,serif;font-size:12px;color:#9E9488;letter-spacing:-.1px">한 줄로 찾는 나</div>
    </div>
    <script>
      // Remove splash after React mounts
      const observer = new MutationObserver(() => {
        if (document.getElementById('root')?.children.length > 0) {
          const splash = document.getElementById('splash');
          if (splash) { splash.style.opacity = '0'; setTimeout(() => splash.remove(), 300); }
          observer.disconnect();
        }
      });
      observer.observe(document.getElementById('root'), { childList: true });
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
